version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Journaling Backend — Docker Compose
#  Services: MySQL 8, Redis 7, Spring Boot API
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: journaling-mysql
    environment:
      MYSQL_ROOT_PASSWORD: db_pw    #change it while push
      MYSQL_DATABASE: journaling_db
      MYSQL_USER: journaling_user
      MYSQL_PASSWORD: journaling_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - journaling-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: journaling-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - journaling-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Spring Boot API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: journaling-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_USER: journaling_user
      MYSQL_PASSWORD: journaling_pass
      JWT_SECRET: mZ7lW8yKQ3xv9F2nR4pJcU6dA0tYbE1sHqG5VzXwLkI=
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - journaling-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: journaling-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - journaling-net
    depends_on:
      - api

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: journaling-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - journaling-net
    depends_on:
      - prometheus

volumes:
  mysql_data:
  redis_data:
  grafana_data:

networks:
  journaling-net:
    driver: bridge
